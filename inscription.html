<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

</head>
<div class="section">
    <h2>Devenir Membre</h2>
    <form id="ongForm">
        <input type="text" id="nom" placeholder="Votre Nom complet" required>
        <input type="email" id="email" placeholder="Votre adresse Email" required>
        <button type="submit" action="index(2).html">S'inscrire maintenant</button>
        <a href="index.html" id="lien">je suis déjà membre</a>
    </form>
    <p id="reponse" style="text-align: center; font-weight: bold; color: #2e7d32;"></p>
</div>

<footer>&copy; 2026 Projet ONG Solidaire - Tous droits réservés</footer>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Cibler le formulaire d'inscription
    const formInscription = document.querySelector('form');

    if (!formInscription) {
        console.error("Erreur : Aucun formulaire trouvé dans la page HTML.");
        return;
    }

    // 2. Écouter l'événement de soumission du formulaire
    formInscription.addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche la page de se recharger

        // 3. Récupérer proprement les valeurs des champs de ton formulaire
        // Vérifie que les "id" (nom, email, etc.) correspondent bien à tes balises <input>
        const nomInput = document.getElementById('nom');
        const emailInput = document.getElementById('email');

        if (!nomInput || !emailInput) {
            alert("Erreur technique : Les champs 'nom' ou 'email' sont introuvables dans le HTML.");
            return;
        }

        // Préparation des données au format JSON attendu par ton API FastAPI
        const developpeurData = {
            nom: nomInput.value.trim(),
            email: emailInput.value.trim()
        };

        // Petite validation de sécurité avant l'envoi
        if (developpeurData.nom === "" || developpeurData.email === "") {
            alert("Veuillez remplir tous les champs obligatoires.");
            return;
        }

        try {
            // 4. Envoi des données vers ton API officielle sur Render 🚀
            const response = await fetch('https://ong-sama-2.onrender.com/inscription', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(developpeurData)
            });

            // 5. Analyse de la réponse du serveur Cloud
            if (response.ok) {
                const resultat = await response.json();
                alert('🎉 Inscription réussie ! Un e-mail de confirmation a été envoyé avec succès.');
                formInscription.reset(); // Vide le formulaire après le succès
            } else {
                const erreurResultat = await response.json().catch(() => ({}));
                console.error("Détails de l'erreur API :", erreurResultat);
                alert(`❌ Échec de l'inscription (Code ${response.status}). Veuillez vérifier les informations.`);
            }

        } catch (error) {
            // Gestion des erreurs si le réseau plante ou si Render dort
            console.error('Erreur réseau ou serveur inaccessible :', error);
            alert('Le serveur de l\'ONG est injoignable pour le moment. Veuillez réessayer dans quelques instants.');
        }
    });
});

</script>
