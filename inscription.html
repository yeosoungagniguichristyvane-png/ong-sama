<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ONG SAMA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #4caf50;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #aaaaaa;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #4caf50;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Rejoindre l'ONG SAMA</h2>
        <form id="inscriptionForm">
            <div class="form-group">
                <label for="nom">Nom Complet</label>
                <input type="text" id="nom" placeholder="Ex: Jean Koffi" required>
            </div>
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" placeholder="Ex: jean@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="telephone">Numéro de Téléphone</label>
                <input type="tel" id="telephone" placeholder="Ex: 0708091011" required>
            </div>
            <button type="submit">S'inscrire</button>
        </form>
    </div>

    <script>
        document.getElementById('inscriptionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Récupération des valeurs saisies dans le formulaire
            const nomValeur = document.getElementById('nom').value;
            const emailValeur = document.getElementById('email').value;
            const telephoneValeur = document.getElementById('telephone').value;

            // Connexion directe avec ton API hébergée sur Render
            fetch("https://ong-sama.onrender.com/inscription", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nom: nomValeur,
                    email: emailValeur,
                    telephone: telephoneValeur
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Erreur de réponse du serveur");
                }
                return response.json();
            })
            .then(data => {
                if (data.status === "success") {
                    alert("🎉 Inscription réussie avec succès sur le serveur Render !");
                    document.getElementById('inscriptionForm').reset(); // Vide le formulaire
                } else {
                    alert("❌ Échec de l'inscription. Le serveur a renvoyé une erreur.");
                }
            })
            .catch(error => {
                console.error("Erreur détectée :", error);
                alert("🌐 Impossible de joindre le serveur. Assure-toi que ton service Render est bien actif et que tu as internet.");
            });
        });
    </script>

</body>
</html>
