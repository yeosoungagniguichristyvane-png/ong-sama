<script>
// Exemple de ce que ton JavaScript doit envoyer
const donneesFormulaire = {
    nom: document.getElementById("nom").value,
    email: document.getElementById("email").value,
    telephone: document.getElementById("telephone").value // Vérifie que l'id correspond bien !
};

fetch("http://localhost:8000/inscription", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(donneesFormulaire)
})
.then(response => response.json())
.then(data => alert(data.message));
</script>
