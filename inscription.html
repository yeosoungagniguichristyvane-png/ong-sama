<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ONG SAMA</title>
    <style>
        /* Un style simple et propre pour ton formulaire */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Rejoindre l'ONG SAMA</h2>
    
    <form id="formInscription">
        <div class="form-group">
            <label for="nom">Nom Complet</label>
            <input type="text" id="nom" placeholder="Ex: Jean Dupont" required>
        </div>
        
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" placeholder="Ex: jean@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="telephone">Numéro de Téléphone</label>
            <input type="tel" id="telephone" placeholder="Ex: +225 0707070707" required>
        </div>
        
        <button type="submit">S'inscrire</button>
    </form>
</div>

<script>
    // Écoute de l'événement de soumission du formulaire
    document.getElementById('formInscription').addEventListener('submit', async function(e) {
        e.preventDefault(); // Empêche la page de se recharger

        // 1. Récupération des données saisies par l'utilisateur
        const donnéesFormulaire = {
            nom: document.getElementById('nom').value,
            email: document.getElementById('email').value,
            telephone: document.getElementById('telephone').value
        };

        try {
            // 2. Envoi des données vers ton serveur Replit sécurisé
            const response = await fetch("https://c39b39a0-838a-4e60-9e33-771ac4b218b0-00-34zxcejpweh3r.riker.replit.dev/inscription", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(donnéesFormulaire)
            });

            // 3. Lecture de la réponse du serveur
            const resultat = await response.json();

            // 4. Traitement du résultat
            if (response.ok && resultat.status === "success") {
                alert("🎉 Félicitations ! Inscription validée avec succès.");
                document.getElementById('formInscription').reset(); // Vide le formulaire
            } else {
                alert("❌ Erreur lors de l'inscription : " + (resultat.detail || "Une erreur est survenue."));
            }

        } catch (error) {
            console.error("Erreur de connexion :", error);
            alert("🌐 Impossible de joindre le serveur. Vérifie que ton serveur Replit est bien actif.");
        }
    });
</script>

</body>
</html>
