<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
      body{
  background-color: white;
}
.section { padding: 30px 20px; max-width: 800px; margin: auto;
background-image: url('image.png');
background-size: cover;
background-position: center;
}
input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;}
button { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
form { display: flex; flex-direction: column; gap: 15px; background: #ffffff; padding: 25px; border-radius: 8px; border: 1px solid #ddd; }
footer{
  text-align: center;
  background-color: orange;
  border-radius: 12px solid black;
}
div h2{
  background-color: orange ;
  text-align: center;
  border: 2px solid black;
}
#lien{
  text-align: center;
  text-decoration: none;
}
/* --- STYLE POUR SMARTPHONE & TABLETTE (Écrans de moins de 768px) --- */
@media screen and (max-width: 768px) {
    body {
        font-size: 16px; /* Ajuste la taille du texte pour les petits écrans */
        padding: 10px;
    }

    /* Force le formulaire à prendre presque toute la largeur sur mobile */
    form {
        width: 95% !important; 
        max-width: none !important;
        margin: 10px auto !important;
        box-sizing: border-box;
    }

    /* Aligne les cases de saisie et le bouton verticalement (les uns sous les autres) */
    input, select, textarea, button {
        width: 100% !important; 
        display: block !important;
        margin-bottom: 15px !important;
        box-sizing: border-box;
        font-size: 16px !important; /* Évite le zoom automatique forcé par iOS/Android */
    }

    /* Si tu as des éléments qui étaient côte à côte (flexbox), on les passe en colonne */
    .flex-container, .row {
        flex-direction: column !important;
    }
}

  </style>
</head>
<div class="section">
    <h2>Devenir Membre</h2>
    <form id="formInscription">
        <input type="text" id="nom" placeholder="Votre Nom complet" required>
        <input type="email" id="email" placeholder="Votre adresse Email" required>
        <input type="tel" id="telephone" required placeholder="Votre numéro de téléphone">

        <button type="submit" action="index(2).html">S'inscrire maintenant</button>
        <a href="index.html" id="lien">je suis déjà membre</a>
    </form>
    <p id="reponse" style="text-align: center; font-weight: bold; color: #2e7d32;"></p>
</div>

<footer>&copy; 2026 Projet ONG Solidaire - Tous droits réservés</footer>
<script>
document.getElementById('formInscription').addEventListener('submit', async function(event) {
  event.preventDefault();

  // 1. Récupération des données du formulaire
  const champNom = document.getElementById('nom');
  const champEmail = document.getElementById('email');
  const champTelephone = document.getElementById('telephone');

  const donneesFormulaire = {
    nom: champNom.value.trim(),
    email: champEmail.value.trim(),
    telephone: champTelephone.value.trim()
  };

  try {
    // 2. Envoi vers ton API Render
    const response = await fetch('https://ong-sama-2.onrender.com/inscription', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(donneesFormulaire)
    });

    // 3. Gestion stricte de la réponse
    if (response.ok) {
      alert('🎉 Inscription enregistrée avec succès !');

      // Préparation et déclenchement du SMS automatique
      const numeroONG = "+225076942122";
      const texteSMS = `Bonjour ${donneesFormulaire.nom}, votre inscription à l'ONG SAMA a bien été validée avec le numéro : ${donneesFormulaire.telephone}. Merci de nous rejoindre !`;

      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const separation = isIOS ? '&' : '?';
      
      window.location.href = `sms:${numeroONG}${separation}body=${encodeURIComponent(texteSMS)}`;

      // On vide le formulaire uniquement ici
      document.getElementById('formInscription').reset();

    } else {
      // Ce message ne s'affichera QUE si le serveur renvoie une erreur (ex: email invalide)
      alert('❌ Échec de l\'envoi. Assure-toi d\'avoir bien rempli le Nom, l\'Email et le Téléphone.');
    }

  } catch (error) {
    console.error('Erreur réseau :', error);
    alert('❌ Impossible de joindre le serveur. Réessaye dans quelques instants.');
  }
});

</script>
