<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin - ONG SAMA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #16a085;
            padding-bottom: 10px;
        }
        .actions {
            margin-bottom: 20px;
        }
        button {
            background-color: #16a085;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #117a65;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .loader {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Liste des Membres Inscrits - ONG SAMA</h1>
    
    <div class="actions">
        <button id="btnActualiser">🔄 Actualiser la liste</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nom & Prénoms</th>
                <th>E-mail</th>
                <th>Téléphone</th>
            </tr>
        </thead>
        <tbody id="listeInscrits">
            <tr>
                <td colspan="3" class="loader">Cliquez sur "Actualiser" pour charger les données...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    document.getElementById('btnActualiser').addEventListener('click', chargerInscrits);

    async function chargerInscrits() {
        const tBody = document.getElementById('listeInscrits');
        tBody.innerHTML = '<tr><td colspan="3" class="loader">Chargement en cours...</td></tr>';

        try {
            // Requête vers ton API Render pour récupérer les membres
            const response = await fetch('https://ong-sama-2.onrender.com/membres');
            
            if (response.ok) {
                const membres = await response.json();
                
                if (membres.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="3" class="loader">Aucun inscrit pour le moment.</td></tr>';
                    return;
                }

                tBody.innerHTML = ''; // On vide le message de chargement
                
                // On boucle sur chaque membre pour l'ajouter dans le tableau
                membres.forEach(membre => {
                    const ligne = document.createElement('tr');
                    ligne.innerHTML = `
                        <td><strong>${membre.nom}</strong></td>
                        <td>${membre.email}</td>
                        <td>${membre.telephone || 'Non renseigné'}</td>
                    `;
                    tBody.appendChild(ligne);
                });
            } else {
                tBody.innerHTML = '<tr><td colspan="3" class="loader" style="color:red;">❌ Impossible de récupérer la liste (Erreur serveur).</td></tr>';
            }
        } catch (error) {
            console.error('Erreur:', error);
            tBody.innerHTML = '<tr><td colspan="3" class="loader" style="color:red;">❌ Erreur réseau. Vérifiez votre connexion.</td></tr>';
        }
    }

    // Charger automatiquement la liste au démarrage de la page
    window.onload = chargerInscrits;
</script>

</body>
</html>
