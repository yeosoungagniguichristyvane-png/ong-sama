<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>contact</title>
  <style>
  body{
    font-family: 'Times New Roman', Times, serif;
  }
  header{
    background-color: orange;
    padding: 50px;
    color: white;
    text-align: center;
    border-top: 4px solid red;
  }
    div{
      background-color: skyblue;
      padding: 50px;
      margin: 10px;
      position: center;
      text-align:left;
      font-weight: bold;
      border-top: 3px solid black;
    }
    footer{
      background-color: black;
      color: white;
      text-align: center;
      border-top:3px solid red;
    }
    /* --- STYLE POUR SMARTPHONE & TABLETTE (Écrans de moins de 768px) --- */
@media screen and (max-width: 768px) {
    body {
        font-size: 16px; /* Ajuste la taille du texte pour les petits écrans */
        padding: 10px;
    }

    /* Force le formulaire à prendre presque toute la largeur sur mobile */
    form {
        width: 95% !important; 
        max-width: none !important;
        margin: 10px auto !important;
        box-sizing: border-box;
    }

    /* Aligne les cases de saisie et le bouton verticalement (les uns sous les autres) */
    input, select, textarea, button {
        width: 100% !important; 
        display: block !important;
        margin-bottom: 15px !important;
        box-sizing: border-box;
        font-size: 16px !important; /* Évite le zoom automatique forcé par iOS/Android */
    }

    /* Si tu as des éléments qui étaient côte à côte (flexbox), on les passe en colonne */
    .flex-container, .row {
        flex-direction: column !important;
    }
}

  </style>
</head>
 
<body>
  <header>
    <h1>contactez-nous</h1>
  </header>
  <div>
    <p><i>Pour joindre l'ONG contacter le numéro de téléphone suivant:</i></p>
    <p><u>Mon numéro:</u> 07-69-49-21-22</p>
    <p><u>Motre E-mail:</u>yyiguevolama@gmail.com</p>
  </div>
  <footer>
    <h1>ONG-SAMA</h1>
    <h4>partenaire</h4>
    <legend>Club informatique</legend>
  </footer>
</body>

</html>
